name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $ref = '${{ github.ref_name }}'
          $version = $ref -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+') { $version = '0.0.0' }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build release body
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          ./.github/scripts/generate-changelog.ps1 `
            -Version '${{ steps.version.outputs.version }}' `
            -ReleaseNotesOut 'release-notes.md' `
            -RepoUrl '${{ github.server_url }}/${{ github.repository }}'
          $body = (Get-Content .github/release-body.md -Raw) + "`n`n" + (Get-Content release-notes.md -Raw)
          Set-Content -Path release-body-final.md -Value $body -Encoding utf8

      - name: Publish portable (framework-dependent, requires .NET 8 Desktop Runtime)
        run: dotnet publish OpenSpeaker/OpenSpeaker.csproj -p:PublishProfile=portable -p:Version=${{ steps.version.outputs.version }}

      - name: Publish standalone (self-contained, all-in-one)
        run: dotnet publish OpenSpeaker/OpenSpeaker.csproj -p:PublishProfile=standalone -p:Version=${{ steps.version.outputs.version }}

      - name: Package
        id: package
        shell: pwsh
        run: |
          $v = '${{ steps.version.outputs.version }}'
          $portableZip = "OpenSpeaker-$v-portable.zip"
          $standaloneZip = "OpenSpeaker-$v-standalone.zip"
          Compress-Archive -Path 'OpenSpeaker/bin/Release/portable/*' -DestinationPath $portableZip -Force
          Compress-Archive -Path 'OpenSpeaker/bin/Release/standalone/*' -DestinationPath $standaloneZip -Force
          "portable=$portableZip" >> $env:GITHUB_OUTPUT
          "standalone=$standaloneZip" >> $env:GITHUB_OUTPUT

      - name: Sign artifacts (minisign)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if (-not $env:MINISIGN_KEY) { Write-Host 'No MINISIGN_KEY secret set, skipping signing.'; exit 0 }
          choco install minisign -y --no-progress | Out-Null
          $key = Join-Path $env:RUNNER_TEMP 'minisign.key'
          $bytes = [Convert]::FromBase64String(($env:MINISIGN_KEY -replace '\s', ''))
          [IO.File]::WriteAllBytes($key, $bytes)
          minisign -S -s $key -m "${{ steps.package.outputs.portable }}"
          minisign -S -s $key -m "${{ steps.package.outputs.standalone }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenSpeaker-builds
          path: |
            ${{ steps.package.outputs.portable }}
            ${{ steps.package.outputs.standalone }}

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: OpenSpeaker ${{ github.ref_name }}
          files: |
            ${{ steps.package.outputs.portable }}
            ${{ steps.package.outputs.standalone }}
            ${{ steps.package.outputs.portable }}.minisig
            ${{ steps.package.outputs.standalone }}.minisig
          body_path: release-body-final.md

      - name: Update CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git checkout main
          ./.github/scripts/generate-changelog.ps1 `
            -Version '${{ steps.version.outputs.version }}' `
            -UpdateChangelog -ChangelogFile 'CHANGELOG.md' `
            -RepoUrl '${{ github.server_url }}/${{ github.repository }}'
          git add CHANGELOG.md
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { Write-Host 'No changelog changes.'; exit 0 }
          git commit -m "docs: update changelog for ${{ steps.version.outputs.version }}"
          git push origin main
