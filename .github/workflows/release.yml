name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $ref = '${{ github.ref_name }}'
          $version = $ref -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+') { $version = '0.0.0' }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish portable (framework-dependent, requires .NET 8 Desktop Runtime)
        run: dotnet publish OpenSpeaker/OpenSpeaker.csproj -p:PublishProfile=portable -p:Version=${{ steps.version.outputs.version }}

      - name: Publish standalone (self-contained, all-in-one)
        run: dotnet publish OpenSpeaker/OpenSpeaker.csproj -p:PublishProfile=standalone -p:Version=${{ steps.version.outputs.version }}

      - name: Package
        id: package
        shell: pwsh
        run: |
          $v = '${{ steps.version.outputs.version }}'
          $portableZip = "OpenSpeaker-$v-portable.zip"
          $standaloneZip = "OpenSpeaker-$v-standalone.zip"
          Compress-Archive -Path 'OpenSpeaker/bin/Release/portable/*' -DestinationPath $portableZip -Force
          Compress-Archive -Path 'OpenSpeaker/bin/Release/standalone/*' -DestinationPath $standaloneZip -Force
          "portable=$portableZip" >> $env:GITHUB_OUTPUT
          "standalone=$standaloneZip" >> $env:GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenSpeaker-builds
          path: |
            ${{ steps.package.outputs.portable }}
            ${{ steps.package.outputs.standalone }}

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: OpenSpeaker ${{ github.ref_name }}
          files: |
            ${{ steps.package.outputs.portable }}
            ${{ steps.package.outputs.standalone }}
          generate_release_notes: true
